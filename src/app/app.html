<div>
  <h1 class="bg-amber-600 text-white p-3 font-bold text-xl">Task App</h1>
  @if (openCreateTaskDialog()) {
  <app-create-task-dialog [(open)]="openCreateTaskDialog" />
  }
  @if (updatedTaskId !== null) {
  <app-update-task-dialog [taskId]="updatedTaskId" (open)="updatedTaskId = $event ? updatedTaskId : null" />
  }
  <div class="m-4 *:my-3">
    <div class="flex flex-row items-center justify-between">
      <h2 class="text-2xl font-bold">Lista de tareas</h2>
      <button class="p-2 rounded bg-blue-500 hover:bg-blue-700 text-white" (click)="openCreateTaskDialog.set(true)">
        Nueva tarea
      </button>
    </div>

    <app-list-task (changeUpdateTask)="updatedTaskId = $event" />
  </div>
  <router-outlet />
